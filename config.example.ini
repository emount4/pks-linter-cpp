# cpp_linter config (key=value)

# File scanning
extensions=.cpp,.h,.hpp

# Rules composition (optional). If specified, linter creates rules from this list.
# Supported values: indentation, spacing, line-length, naming, use-before-init, memory-leak
# (also accepts canonical IDs like STYLE-SPACING).
#enabled.rules=indentation,spacing,line-length,naming,use-before-init,memory-leak

# Style rules
style.indentation.enabled=true
style.indentation.indent_size=4
style.indentation.allow_tabs=false

style.line_length.enabled=true
style.line_length.max=80

style.spacing.enabled=true

style.naming.enabled=true
# Supported values: any, lowerCamel, UpperCamel, snake_case, UPPER_SNAKE
style.naming.variables=lowerCamel
style.naming.functions=lowerCamel
style.naming.constants=UPPER_SNAKE

# Bug rules
bug.use_before_init.enabled=true
bug.memory_leak.enabled=true
