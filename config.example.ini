[general]
mode=full
show_progress=true

[style]
indent_size=4
allow_tabs=false
max_line_length=120
variable_case=snake_case
function_case=camel_case
constant_case=upper_case

[rules]
enabled=STYLE-INDENTATION,STYLE-SPACING,STYLE-LINE-LENGTH,STYLE-NAMING,BUG-USE-BEFORE-INIT,BUG-MEMORY-LEAK
disabled=

[severity]
STYLE-INDENTATION=warning
STYLE-SPACING=warning
STYLE-LINE-LENGTH=warning
STYLE-NAMING=warning
BUG-USE-BEFORE-INIT=error
BUG-MEMORY-LEAK=warning

[exclude]
dirs=build,.git,third_party,cmake-build-debug,cmake-build-release
files=
